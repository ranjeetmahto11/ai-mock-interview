
# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ai_mock_interview?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=MYSQL_USERNAME
spring.datasource.password=MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=YOUR_JWT_SECRET_MIN_32_CHARACTERS
app.jwt.expiration=86400000

# Groq API
groq.api.key=GROQ_API_KEY
groq.api.url=https://api.groq.com/openai/v1